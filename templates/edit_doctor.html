{% extends 'base.html' %}
{% set title = 'Edit Doctor' %}

{% block content %}
<div class="panel">
  <h2>Edit Doctor</h2>

  <form method="POST" class="grid-form">
    <input type="text" name="name" value="{{ doctor.name }}" required>
    <input type="text" name="specialization" value="{{ doctor.specialization }}" required>
    <input type="text" name="phone" value="{{ doctor.phone }}" required>
    <input type="email" name="email" value="{{ doctor.email }}" required>
    <input type="number" name="fee" value="{{ doctor.fee }}" required>

    <select name="status" required>
      <option value="Active" {% if doctor.status == 'Active' %}selected{% endif %}>Active</option>
      <option value="Inactive" {% if doctor.status == 'Inactive' %}selected{% endif %}>Inactive</option>
    </select>

    <button type="submit">Update Doctor</button>
    <a class="btn-secondary" href="{{ url_for('doctors') }}">Cancel</a>
  </form>
</div>
{% endblock %}
